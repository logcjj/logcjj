name: Refresh profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "24 2 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-profile-readme
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update hidden refresh marker
        run: node scripts/update-readme.mjs --heartbeat-only

      - name: Commit README refresh
        run: |
          if git diff --quiet README.md; then
            echo "README is already fresh."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Refresh profile README"
          git push
